# Doku-Referenz-Checks via d-check (ghcr.io/pt9912/d-check) — ersetzt
# das vendorte tools/docs-check.js (MR-003-Auflösung, Rollout
# 2026-06-12, JS-Familie). Scan über die gesamte Repo-Wurzel wie das
# Alt-Tool. codepaths-Wurzeln an b-cad angepasst — die vendorte
# Kurs-Kopie prüfte nur lab/, kurs/, tools/ (zwei davon existieren
# hier nicht); ./ und ../ werden immer erkannt.
# matrix/ids/spans/hostpaths: Referenz-Integritäts-Gate — normativ sind das
# Kurs-Regelwerk + harness/conventions.md (MR-011/MR-014), nicht dieser Kommentar.
# matrix adr->slice (MR-014, d-check v0.37.1): ADR-Koerper nennt keine slice-NNN
# (no-downward), ausser per <!-- d-check:status-provenance -->-Zeilenmarker.
# Beschreibung siehe: https://raw.githubusercontent.com/pt9912/d-check/refs/heads/main/README.md
scan:
  roots: ["."]
modules: [links, anchors, codepaths, spans, hostpaths, matrix, ids, planning]
codepaths:
  roots: [docs, spec, harness, tools, src]
  # slice-033/MR-014: die tools/Dockerfile-FROM-Stage entfiel mit der Umstellung
  # von docs-check auf d-check.mk (Bind-Mount); slice-004 (done-archive,
  # eingefroren) nennt die Datei noch als Verifikations-Zeiger — Tombstone statt
  # Bruch (codepaths.ignore-refs, d-check-v0.34-Feature).
  ignore-refs: ["tools/Dockerfile"]

# Referenz-Richtung: Spec-Straten verweisen nie abwärts auf ADRs/Planning-Slices
# (Markdown-Link-Form). Maßgeblich — NICHT dieser Kommentar — sind das gepinnte
# Kurs-Regelwerk (§Referenz-Richtung / SDP) und harness/conventions.md (MR-011
# Referenz-Integritäts-Gate). exclude-sections = die
# Provenance-Abschnitte (Historie/Geschichte); die Spec-Historie liegt zudem
# in spec/<name>-historie.md ausgelagert (außerhalb der matrix-Straten).
matrix:
  classes:
    - name: spec-straten
      paths: [spec/lastenheft.md, spec/spezifikation.md, spec/architecture.md]
    - name: adr
      paths: ["docs/plan/adr/[0-9]*.md"]
    - name: slice
      paths: ["docs/plan/planning/**/slice-*.md"]
      # Token-Erkennung (Verschärfung 2026-07-05, d-check v0.37.1, Feature ab
      # v0.31): eine Slice-Kennung als bare Token im ADR-/Spec-Körper ⇒
      # matrix-forbidden (Stable Dependencies / no-downward — stabile Straten
      # verweisen nicht auf volatile Slices), außer per Zeilen-Marker
      # <!-- d-check:status-provenance --> als Verifikations-Zeiger deklariert.
      token: 'slice-\d{3}'
  rules:
    - {from: spec-straten, to: adr, allow: false}
    - {from: spec-straten, to: slice, allow: false}
    - {from: adr, to: slice, allow: false}
  status:
    forbidden: [superseded, deprecated]
  # Grandfathering: die vor der Verschärfung Accepted-ADRs (0001–0017) nennen
  # Slices als Verifikations-Zeiger im Körper (immutabel, AGENTS §2.5) — ganz
  # exempt; ab ADR-0018 gilt die Disziplin (Folge-Slice-Nummern nur im mutablen
  # ADR-Index, Präzedenz-Verweise per ADR statt Slice).
  exempt-paths: ["docs/plan/adr/000[1-9]-*.md", "docs/plan/adr/001[0-7]-*.md"]
  exclude-sections: [Historie, Geschichte, Änderungshistorie]

# Linkpflicht für Kennungen (Adaption MR-011): alle 7 ID-Familien über den
# Voll-Korpus, link-policy always (nackte UND Inline-Code-Vorkommen). done-archive
# via scope.ignore raus (eingefroren). Logs (CHANGELOG/reviews/*-historie) via
# exempt-paths (je Pattern unten) von der ID-Linkpflicht befreit. Maßgeblich —
# statt eines hier driftenden Verhaltens-Texts — sind die Adaption MR-011
# (harness/conventions.md) und die in d-check.mk gepinnte d-check-Version
# (deren exempt-Semantik). Anker/Links generiert von tools/idlink.py, vom Gate validiert.
# LH-FA-Regex D3-fest ([A-Z][A-Z0-9]*); Cross-Stratum: Ziel = kanonische
# Definitionsdatei der Familie, unabhängig von der Fundstelle.
ids:
  scope:
    roots: ["."]
    ignore: ["docs/plan/planning/done-archive"]
  patterns:
    - regex: 'ADR-\d{4}'
      target: docs/plan/adr/
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**", "spec/*-historie.md"]
    - regex: 'MR-\d{3}'
      target: harness/conventions.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**", "spec/*-historie.md"]
    - regex: 'LH-(FA-[A-Z][A-Z0-9]*|QA)-\d+'
      target: spec/lastenheft.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**", "spec/*-historie.md"]
    - regex: 'ACC-\d+'
      target: spec/lastenheft.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**", "spec/*-historie.md"]
    - regex: 'OBJ-\d+'
      target: spec/lastenheft.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**", "spec/*-historie.md"]
    - regex: 'REQ-TEC-\d+'
      target: spec/spezifikation.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**", "spec/*-historie.md"]
    - regex: 'E-(IO|VAL|GEO|PLG)-\d+'
      target: spec/spezifikation.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**", "spec/*-historie.md"]

# Modul commits (slice-034, MR-015): Traceability-Kennung je Commit-Message über
# eine Range — macht AGENTS §4 computational. NICHT im Default-modules-Set (git-
# abhängig via --range/--commit-msg); läuft über `make doc-commits` (CI-Liste,
# Muster schema-check/io-smoke), nicht im hermetischen `make gates`. id-patterns =
# b-cads gelebte Kennungs-Familien (slice dominiert; ADR/MR/LH ebenfalls — bewusst
# breiter als der §4-Wortlaut "LH/ADR", der die slice-/MR-Praxis nicht abbildet).
commits:
  id-patterns:
    - 'slice-\d{3}'
    - 'ADR-\d{4}'
    - 'MR-\d{3}'
    - 'LH-(FA-[A-Z][A-Z0-9]*|QA)-\d+'
  exempt-pattern: '^(Merge |Revert )'

# Modul vcs (slice-035, MR-016): git-Diff-Immutabilität des ADR-Core über eine Range —
# macht AGENTS §2.5 (Accepted-ADRs immutabel) computational. NICHT im modules-Set (git-
# abhängig via --range/--staged); läuft über `make doc-immutable` (CI-Liste, Muster
# commits/schema-check), nicht im hermetischen `make gates`. immutable-when trifft b-cads
# ADR-Status-Zeile (Zeile 3); head-allow = die §2.5-Supersede-Mechanik; die mutable
# ## Geschichte-Provenance zählt nicht zum Core. Löst das adr-check-Skript-Muster ab
# (a-check-Präzedenz, wie commits/trace-check).
vcs:
  paths: ["docs/plan/adr/[0-9]*.md"]
  immutable-when: '^\*\*Status:\*\* Accepted'
  status-line: '^\*\*Status:\*\*'
  exclude-sections: [Geschichte]
  head-allow: '^\*\*Status:\*\* (Accepted|Superseded by ADR-\d{4})'

# Modul planning (slice-036, MR-017): Roadmap-↔-in-progress-Lifecycle-Konsistenz — der
# Ruhe-Marker steht im `## Aktuelle Welle`-Block genau dann, wenn kein slice-* in
# in-progress/ liegt (planning-drift). HERMETISCH (nur Arbeitsbaum, kein git) -> kann als
# modules-Member echter make-gates-Bestandteil sein (Entscheidung slice-036). Löst das
# planning-check-Skript-Muster ab (letztes Familien-Skript).
planning:
  roadmap: docs/plan/planning/in-progress/roadmap.md
  heading: "## Aktuelle Welle"        # explizit statt Default [Review-L2]
  slice-glob: "slice-*"               # explizit statt Default [Review-L2]
  marker: "Keine offenen Slices"      # RESERVIERTER Sentinel [Review-L3]: nur vom Toggle
                                      # geschrieben, exakt-case, NIE als Prosa im AW-Block
